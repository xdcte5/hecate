# Routing is ability-based via harness cards in registry.yaml.
routing: []

# Failover order breaks ability-score ties (first match wins).
# Pi is first so implement steps prefer Pi when harnesses score equally.
failover:
  - pi
  - cursor
  - claude-code
  - codex

governance:
  requireGitSnapshotOnHandoff: true
  maxHandoffTokens: 8000
  maxTranscriptLines: 200
